name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    # Skip release/Docker when only docs, editor config, tests, or workflow metadata changed.
    paths-ignore:
      - "**/*.md"
      - ".cursor/**"
      - "docs/**"
      - "tests/**"
      - ".github/**"
      - ".gitignore"
      - ".gitattributes"
      - ".editorconfig"

# Only one release at a time. Parallel pushes used to race on the same patch bump
# (duplicate v1.3.x tags, failed "Commit, tag, and push", skipped GitHub Release).
concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    if: >-
      (github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version to')) ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version in package.json
        id: version
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = "package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          const parts = pkg.version.split(".").map((n) => parseInt(n, 10));
          if (parts.length !== 3 || parts.some((n) => !Number.isFinite(n))) {
            throw new Error(`Invalid semver in package.json: ${pkg.version}`);
          }
          parts[2] += 1;
          pkg.version = parts.join(".");
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          console.log(pkg.version);
          NODE
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "minor=$(echo "${VERSION}" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: n3ro88/pickhome
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=sha,format=short,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          if git diff --cached --quiet; then
            echo "package.json already at ${VERSION}"
          else
            git commit -m "chore: bump version to ${VERSION}"
          fi
          git pull --rebase origin main
          HEAD_SHA=$(git rev-parse HEAD)
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" 2>/dev/null || true
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-parse "refs/tags/${TAG}^{}")
            if [ "${TAG_SHA}" != "${HEAD_SHA}" ]; then
              echo "::error::Tag ${TAG} already exists at ${TAG_SHA}, HEAD is ${HEAD_SHA}"
              exit 1
            fi
            echo "Tag ${TAG} already at HEAD"
          else
            git tag "${TAG}"
          fi
          git push origin main
          git push origin "refs/tags/${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
