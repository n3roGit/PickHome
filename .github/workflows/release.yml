name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: >-
      github.event_name == 'push' &&
      !startsWith(github.event.head_commit.message, 'chore: bump version to')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version in package.json
        id: version
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = "package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          const parts = pkg.version.split(".").map((n) => parseInt(n, 10));
          if (parts.length !== 3 || parts.some((n) => !Number.isFinite(n))) {
            throw new Error(`Invalid semver in package.json: ${pkg.version}`);
          }
          parts[2] += 1;
          pkg.version = parts.join(".");
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          console.log(pkg.version);
          NODE
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "minor=$(echo "${VERSION}" | cut -d. -f1-2)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: n3ro88/pickhome
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.minor }}
            type=sha,format=short,prefix=

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: bump version to ${VERSION}"
          git tag "${TAG}"
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
