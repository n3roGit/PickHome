name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summarize release
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          echo "Published ${{ steps.release.outputs.tag_name }}"
          echo "Docker: n3ro88/pickhome:${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}"
