name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
        env:
          DATABASE_URL: file:./data/test-ci.db
      - name: Production build (matches Docker release)
        run: npm run build
        env:
          DATABASE_URL: file:./data/test-ci.db
